# ============================================
# values-movies.yaml
# Configuration du microservice movie-service
# ============================================

# Image Docker du microservice
image:
  repository: reasg/jenkins_for_devops_movie_service
  tag: latest

# Configuration PostgreSQL
db:
  image: postgres:12.1-alpine
  mountPath: /var/lib/postgresql/data/
  storage: 1G  # Augmenter en prod (ex: 50G)

# Variables ConfigMap (non sensibles)
configMap:
  POSTGRES_DB: movie_db_dev
  POSTGRES_USER: movie_db_username

# Variables d'environnement
env:
  containerPort: 8000
  castServiceName: "cast-service-fastapiapp"  # kubectl get svc -n dev pour vérifier


# Secret (voir values-secret.yaml — jamais committé)
# secret:
#   POSTGRES_PASSWORD: ???