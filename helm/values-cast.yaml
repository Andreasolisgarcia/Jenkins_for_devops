# ============================================
# values-cast.yaml
# Configuration for the movie-service microservice
# ============================================

# Docker image
image:
  repository: reasg/jenkins_for_devops_cast_service
  tag: latest

# Deployment environment variables
env:
  containerPort: 8000
  castServiceName: ""

# Microservice Kubernetes Service
service:
  # this name must match castServiceName in values-movie.yaml
  name: "cast-service-svc"   
  type: NodePort
  port: 80
  nodePort: 30008
  targetPort: 8000

db:
  image: postgres:12.1-alpine
  mountPath: /var/lib/postgresql/data/
  storage: 1G  # Increase in production (e.g. 50G)

# ConfigMap variables (non-sensitive)
configMap:
  POSTGRES_DB: cast_db_dev
  POSTGRES_USER: cast_db_username


# Secrets — never committed to Git
#
# Option 1 — local file (recommended):
#   Create values-cast-secret.yaml and add to .gitignore:
#
#   secret:
#     POSTGRES_PASSWORD: yourpassword
#
#   helm install cast-service ./helm/charts \
#     -f ./helm/values-cast.yaml \
#     -f ./helm/values-cast-secret.yaml
#
# Option 2 — CLI (CI/CD pipelines):
#   helm install cast-service ./helm/charts \
#     -f ./helm/values-cast.yaml \
#     --set secret.POSTGRES_PASSWORD=yourpassword