# ============================================
# values-movies.yaml
# Configuration for the movie-service microservice
# ============================================

# Docker image
image:
  repository: reasg/jenkins_for_devops_movie_service
  tag: latest

# Deployment environment variables
env:
  containerPort: 8000
  # Run 'kubectl get svc -n dev' to verify the exact service name
  castServiceName: "cast-service-svc"

# Microservice Kubernetes Service
service:
  type: NodePort
  port: 80
  nodePort: 30007
  targetPort: 8000

# PostgreSQL configuration
db:
  image: postgres:12.1-alpine
  mountPath: /var/lib/postgresql/data/
  storage: 1G  # Increase in production (e.g. 50G)

# ConfigMap variables (non-sensitive)
configMap:
  POSTGRES_DB: movie_db_dev
  POSTGRES_USER: movie_db_username

# Secrets — never committed to Git
# Option 1 — local file (recommended):
#   Create values-secret.yaml and add to .gitignore
#   helm install movie-service ./charts \
#     -f values-movies.yaml \
#     -f values-secret.yaml
#
# Option 2 — CLI (CI/CD pipelines):
#   helm install movie-service ./charts \
#     -f ./charts/values-movies.yaml \
#     --set secret.POSTGRES_PASSWORD=yourpassword